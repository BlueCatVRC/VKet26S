<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>VKet Summer 2026</title>
        <style>
            * {
                --card-color: #425166;
            }

            body {
                background-color: #1f1f20;
            }

            #worlds {
                display: grid;
                width: 100%;
                height: 100%;
                grid-template-columns: repeat(auto-fit, minmax(256px, 1fr));
                justify-content: start;
                row-gap: 6px;
                column-gap: 6px;
                align-items: start;
                align-content: start;
            }

            .world {
                box-sizing: border-box;
                aspect-ratio: 1.33333333333;
                position: relative;
                font-size: 15px;
                text-align: center;
            }

            .world .background {
                box-sizing: border-box;
                display: block;
                border-width: 2px;
                border-style: solid;
                border-color: var(--card-color);
                border-radius: 5px;
                width: 100%;
                height: 100%;
            }

            .world .name {
                box-sizing: border-box;
                position: absolute;
                bottom: 0%;
                left: 0%;
                transform: translate(-00%, -00%);
                background-color: var(--card-color);
                border-radius: 0px 0px 5px 5px;
                color: #efefff;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                font-weight: 600;
                padding: 2px 5px;
                width: 100%;
                text-decoration: none;
            }

            .world .button-bar {
                position: absolute;
                top: 0%;
                right: 0%;
                background-color: var(--card-color);
                border-radius: 0px 5px 0px 5px;
                text-align: center;
                width: fit-content;
                height: 20px;
                padding: 2px 5px 2px 5px;
                text-decoration: none;
            }

            .world .button-bar .btn {
                float: left;
                position: relative;
                width: 20px;
                height: 20px;
                user-select: none;
            }

            .world .button-bar .btn:not(:first-of-type) {
                margin-left: 7px;
            }

            .world .button-bar .btn:not(:first-of-type)::before {
                content: "";
                position: absolute;
                left: -4px;
                top: 0;
                height: 100%;
                width: 1px;
                background: var(--card-color);
                filter: brightness(0.7);
            }

            .world .button-bar img {
                width: 100%;
                height: 100%;
            }

            .world .button-bar img:hover {
                filter: brightness(0.7);
            }

            .world .button-bar img:active {
                filter: brightness(0.9);
            }

            .seen {
                opacity: 40%;
            }
        </style>
    </head>

            let seenWorlds = JSON.parse(localStorage.getItem("seenWorlds_vk26s"));
            if (!seenWorlds) {
                seenWorlds = {};
                localStorage.setItem("seenWorlds_vk26s", JSON.stringify(seenWorlds));
            }

            worlds.forEach((world) => {
                const root = document.createElement("div");
                root.className = "world";

                const img = document.createElement("img");
                img.className = "background";
                img.src = world.image;
                root.appendChild(img);

                const name = document.createElement("a");
                name.className = "name";
                name.textContent = world.name;
                name.target = "_blank";
                name.href = `https://vrchat.com/home/world/${world.id}/info`;
                root.appendChild(name);

                const buttonBar = document.createElement("div");
                buttonBar.className = "button-bar";
                root.appendChild(buttonBar);

                const buttonBarOpenInVRC = document.createElement("a");
                buttonBarOpenInVRC.title = "Open in VRChat";
                buttonBarOpenInVRC.href = `vrchat://launch?ref=bluecat.vkettracker&id=${world.id}:${String(
                    Math.floor(Math.random() * 100000)
                ).padStart(5, "0")}&attach=1`;
                buttonBarOpenInVRC.classList.add("btn");
                buttonBarOpenInVRC.innerHTML = '<img src="https://assets.vrchat.com/www/favicons/favicon-32x32.png" />';

                const buttonBarOpenInVRCX = document.createElement("a");
                buttonBarOpenInVRCX.title = "Open in VRCX";
                buttonBarOpenInVRCX.href = `vrcx://world/${world.id}`;

                buttonBar.appendChild(buttonBarOpenInVRCX);

                img.addEventListener("click", () => {
                    root.classList.toggle("seen");

                    const isSeen = root.classList.contains("seen");
                    if (isSeen) seenWorlds[world.id] = true;
                    else delete seenWorlds[world.id];

                    localStorage.setItem("seenWorlds_vk26s", JSON.stringify(seenWorlds));
                });

                worldsContainer.appendChild(root);
            });
